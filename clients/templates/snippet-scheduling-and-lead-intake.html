<!--
  ================================================================
  CLIENT SNIPPET — SCHEDULING CALENDAR + LEAD INTAKE FORM
  ================================================================
  Use this when a client already has a website and you need to
  add both a booking calendar AND a lead intake form.

  HOW TO USE:
  1. Copy the <style> block into the <head> of the client's site.
  2. Copy the <!-- SNIPPET HTML --> block and paste it on the page.
  3. Copy the <script> block and paste it just before </body>.
  4. Replace every placeholder:
       [CLIENT_CALENDLY_URL] — the client's full Calendly URL
                               e.g. https://calendly.com/clientname/15min
       WEBHOOK_URL           — the Apps Script deployment URL
       [SERVICE_X]           — the client's actual service names
       [CLIENT_BUSINESS_NAME] — e.g. "Rivera Plumbing"
  ================================================================
-->

<!-- ══ 1. PASTE THIS IN <head> ══════════════════════════════════ -->
<style>
  /* Scheduling + Lead Intake — client snippet */
  .sli-section {
    padding: 80px 28px;
    background: #faf7f2;
    font-family: 'Jost', system-ui, sans-serif;
  }
  .sli-inner {
    max-width: 1080px;
    margin: 0 auto;
  }
  .sli-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--accent, #3d72a8);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .sli-label::before {
    content: ''; display: block;
    width: 24px; height: 1.5px; background: var(--accent-lt, #6b9bc4);
  }
  .sli-heading {
    font-family: Georgia, serif;
    font-size: clamp(28px, 4vw, 42px);
    letter-spacing: -0.02em; color: var(--dark, #1a2f50);
    line-height: 1.1; margin-bottom: 10px;
  }
  .sli-heading em { font-style: italic; color: var(--accent, #3d72a8); }
  .sli-sub {
    font-size: 16px; color: #5c7898;
    font-weight: 300; max-width: 520px; line-height: 1.7;
    margin-bottom: 48px;
  }
  .sli-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 36px; align-items: start;
  }

  /* ── Calendar Panel ── */
  .sli-cal-panel {
    background: #1a2f50;
    border-radius: 10px;
    padding: 36px 32px;
    position: relative; overflow: hidden;
  }
  .sli-cal-panel::before {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(circle at 90% 10%, rgba(196,168,130,0.15) 0%, transparent 60%);
  }
  .sli-cal-title {
    font-family: Georgia, serif;
    font-size: 26px; font-weight: 700;
    color: #fff; line-height: 1.1; margin-bottom: 10px;
  }
  .sli-cal-sub {
    font-size: 14px; color: rgba(255,255,255,0.6);
    font-weight: 300; line-height: 1.7; margin-bottom: 20px;
  }
  .sli-perks { list-style: none; margin-bottom: 24px; }
  .sli-perks li {
    font-size: 14px; color: rgba(255,255,255,0.85);
    margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
  }
  .sli-perks li::before {
    content: '✓'; font-size: 12px; font-weight: 700;
    color: #6b9bc4; flex-shrink: 0;
  }
  .sli-cal-widget {
    background: #fff; border-radius: 10px;
    padding: 20px 16px 12px;
  }
  .sli-cal-header {
    font-family: Georgia, serif; font-size: 18px; font-weight: 700;
    color: #1a2f50; text-align: center; margin-bottom: 14px;
  }
  .sli-cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .sli-cal-btn {
    background: #f5f0e8; border: none; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    font-size: 22px; line-height: 1; color: #1a2f50;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .sli-cal-btn:hover:not(:disabled) { background: #d8e4f0; }
  .sli-cal-btn:disabled { opacity: 0.25; cursor: default; }
  .sli-cal-month { font-size: 14px; font-weight: 500; color: #1a2f50; }
  .sli-cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    text-align: center; margin-bottom: 4px;
  }
  .sli-cal-weekdays span {
    font-size: 9px; font-weight: 600; letter-spacing: 0.05em;
    color: #5c7898; padding: 3px 0; text-transform: uppercase;
  }
  .sli-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .sli-cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 12px; border-radius: 50%; cursor: pointer;
    color: #1a2f50; font-weight: 600; position: relative;
    transition: background 0.15s, color 0.15s;
  }
  .sli-cal-day:hover:not(.sli-cal-day--past):not(.sli-cal-day--empty) {
    background: #d8e4f0; color: #2a5589;
  }
  .sli-cal-day--past { color: #ccc; cursor: default; font-weight: 400; }
  .sli-cal-day--empty { cursor: default; }
  .sli-cal-day--today::after {
    content: ''; position: absolute; bottom: 2px; left: 50%;
    transform: translateX(-50%); width: 4px; height: 4px;
    border-radius: 50%; background: var(--accent, #3d72a8);
  }
  .sli-cal-tz { text-align: center; margin-top: 10px; font-size: 10px; color: #5c7898; }

  /* ── Lead Intake Form Panel ── */
  .sli-form-card {
    background: #ffffff;
    border: 1px solid #ccd8ea;
    border-radius: 10px;
    padding: 40px 36px;
    box-shadow: 0 4px 32px rgba(26,47,80,0.10);
  }
  .sli-form-title {
    font-family: Georgia, serif; font-size: 24px; font-weight: 700;
    color: #1a2f50; margin-bottom: 6px;
  }
  .sli-form-sub { font-size: 14px; color: #5c7898; margin-bottom: 24px; }
  .sli-badge {
    display: flex; align-items: center; gap: 10px;
    background: #f5edd8; border: 1px solid #d8e4f0;
    border-radius: 5px; padding: 12px 14px; margin-bottom: 24px;
  }
  .sli-badge p { font-size: 13px; color: #2a5589; margin: 0; }
  .sli-badge strong { font-weight: 600; }
  .sli-field { margin-bottom: 16px; }
  .sli-field label {
    display: block; font-size: 12px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    color: #5c7898; margin-bottom: 8px;
  }
  .sli-field input,
  .sli-field select,
  .sli-field textarea {
    width: 100%; padding: 12px 16px;
    border: 1px solid #ccd8ea; border-radius: 5px;
    font-family: inherit; font-size: 15px;
    color: #1c2d45; background: #faf7f2;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none; -webkit-appearance: none;
  }
  .sli-field input:focus,
  .sli-field select:focus,
  .sli-field textarea:focus {
    border-color: var(--accent, #3d72a8);
    box-shadow: 0 0 0 3px rgba(61,114,168,0.1);
    background: #fff;
  }
  .sli-field textarea { height: 100px; resize: vertical; }
  .sli-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .sli-submit {
    width: 100%; padding: 15px;
    background: var(--accent, #3d72a8); color: #fff; border: none;
    border-radius: 5px; font-family: inherit;
    font-size: 13px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; cursor: pointer;
    transition: background 0.2s, transform 0.15s; margin-top: 6px;
  }
  .sli-submit:hover { background: var(--accent-d, #2a5589); transform: translateY(-1px); }
  .sli-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .sli-note { font-size: 12px; color: #5c7898; text-align: center; margin-top: 12px; }
  .sli-success { display: none; text-align: center; padding: 40px 20px; }
  .sli-success.show { display: block; }
  .sli-success-icon {
    width: 60px; height: 60px; margin: 0 auto 20px;
    background: #f5edd8; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 26px;
  }
  .sli-success h3 { font-family: Georgia, serif; font-size: 24px; color: #1a2f50; margin-bottom: 10px; }
  .sli-success p { font-size: 15px; color: #5c7898; }

  /* ── Modal ── */
  .sli-modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65); z-index: 500;
    align-items: center; justify-content: center; padding: 20px;
  }
  .sli-modal-overlay.open { display: flex; }
  .sli-modal {
    background: #fff; border-radius: 10px;
    position: relative; width: 100%; max-width: 440px;
    overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.25);
  }
  #sli-modal-content iframe { display: block; width: 100%; height: 700px; border: none; }
  .sli-modal-close {
    position: absolute; top: 10px; right: 10px; z-index: 10;
    background: rgba(0,0,0,0.08); border: none; cursor: pointer;
    width: 30px; height: 30px; border-radius: 50%;
    font-size: 13px; color: #1a2f50;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .sli-modal-close:hover { background: rgba(0,0,0,0.15); }

  @media (max-width: 860px) {
    .sli-grid { grid-template-columns: 1fr; }
    .sli-form-card { padding: 28px 20px; }
  }
  @media (max-width: 600px) {
    .sli-section { padding: 56px 20px; }
    .sli-row { grid-template-columns: 1fr; }
    .sli-cal-panel { padding: 24px 20px; }
  }
</style>
<!-- ══ END <head> STYLES ═════════════════════════════════════════ -->

<!-- ══ 3. PASTE THIS JUST BEFORE </body> ════════════════════════ -->
<script>
  // EDIT: replace with this client's Calendly URL
  const SLI_CALENDLY = '[CLIENT_CALENDLY_URL]';

  // EDIT: replace with this client's Apps Script webhook URL
  const SLI_WEBHOOK = 'YOUR_APPS_SCRIPT_WEBHOOK_URL_HERE';

  // ── Calendar ──
  (function () {
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.getElementById('sli-cal-tz').textContent =
      'Times shown in ' + userTZ.replace(/_/g, ' ');

    const today = new Date(); today.setHours(0,0,0,0);
    let viewYear  = today.getFullYear();
    let viewMonth = today.getMonth();

    function render() {
      document.getElementById('sli-cal-month').textContent =
        MONTHS[viewMonth] + ' ' + viewYear;

      const prevBtn = document.getElementById('sli-cal-prev');
      prevBtn.disabled = (viewYear === today.getFullYear() && viewMonth === today.getMonth());

      const grid = document.getElementById('sli-cal-grid');
      grid.innerHTML = '';

      const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'sli-cal-day sli-cal-day--empty';
        grid.appendChild(el);
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(viewYear, viewMonth, d);
        const el   = document.createElement('div');
        el.className = 'sli-cal-day';
        el.textContent = d;

        if (date < today) {
          el.classList.add('sli-cal-day--past');
        } else {
          if (date.getTime() === today.getTime()) el.classList.add('sli-cal-day--today');
          const y = viewYear, m = viewMonth, day = d;
          el.addEventListener('click', function () { sliOpenModal(y, m, day); });
        }
        grid.appendChild(el);
      }
    }

    document.getElementById('sli-cal-prev').addEventListener('click', function () {
      if (viewMonth === 0) { viewMonth = 11; viewYear--; } else viewMonth--;
      render();
    });
    document.getElementById('sli-cal-next').addEventListener('click', function () {
      if (viewMonth === 11) { viewMonth = 0; viewYear++; } else viewMonth++;
      render();
    });

    render();

    window.sliOpenModal = function (y, m, d) {
      const dateStr = y + '-' + String(m + 1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const url = SLI_CALENDLY + '?date=' + dateStr
        + '&hide_gdpr_banner=1'
        + '&timezone=' + encodeURIComponent(userTZ);
      document.getElementById('sli-modal-content').innerHTML =
        '<iframe src="' + url + '" allowfullscreen></iframe>';
      document.getElementById('sli-modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    };

    function sliCloseModal() {
      document.getElementById('sli-modal-overlay').classList.remove('open');
      document.getElementById('sli-modal-content').innerHTML = '';
      document.body.style.overflow = '';
    }

    document.getElementById('sli-modal-close').addEventListener('click', sliCloseModal);
    document.getElementById('sli-modal-overlay').addEventListener('click', function (e) {
      if (e.target === this) sliCloseModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') sliCloseModal();
    });
  })();

  // ── Lead Intake Form ──
  async function sliHandleSubmit() {
    const name    = document.getElementById('sli-name').value.trim();
    const phone   = document.getElementById('sli-phone').value.trim();
    const email   = document.getElementById('sli-email').value.trim();
    const service = document.getElementById('sli-service').value;
    const area    = document.getElementById('sli-area').value.trim();
    const notes   = document.getElementById('sli-notes').value.trim();

    if (!name || !phone || !service) {
      alert('Please fill in your name, phone number, and service needed.');
      return;
    }

    const btn = document.getElementById('sli-submit-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    const payload = {
      name, phone, email, service, area, notes,
      submitted_at: new Date().toISOString()
    };

    try {
      await fetch(SLI_WEBHOOK, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      });
      document.getElementById('sli-success-name').textContent = name.split(' ')[0];
      document.getElementById('sli-form-body').style.display = 'none';
      document.getElementById('sli-success').classList.add('show');
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Send my request \u2192';
      alert('Something went wrong. Please call or email us directly.');
    }
  }
</script>

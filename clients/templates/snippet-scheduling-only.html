<!--
  ================================================================
  CLIENT SNIPPET — SCHEDULING CALENDAR ONLY
  ================================================================
  Use this when a client already has a website and you just need
  to drop in a booking calendar (no lead intake form).

  HOW TO USE:
  1. Copy the <style> block into the <head> of the client's site.
  2. Copy the <!-- SNIPPET HTML --> block and paste it on the page.
  3. Copy the <script> block and paste it just before </body>.
  4. Replace every placeholder:
       [CLIENT_CALENDLY_URL] — the client's full Calendly URL
                               e.g. https://calendly.com/clientname/15min
  ================================================================
-->

<!-- ══ 1. PASTE THIS IN <head> ══════════════════════════════════ -->
<style>
  /* Scheduling Calendar Only — client snippet */
  .sc-section {
    padding: 80px 28px;
    background: #faf7f2;
    font-family: 'Jost', system-ui, sans-serif;
  }
  .sc-inner {
    max-width: 880px;
    margin: 0 auto;
  }
  .sc-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--accent, #3d72a8);
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .sc-label::before {
    content: ''; display: block;
    width: 24px; height: 1.5px; background: var(--accent-lt, #6b9bc4);
  }
  .sc-heading {
    font-family: Georgia, serif;
    font-size: clamp(28px, 4vw, 42px);
    letter-spacing: -0.02em; color: var(--dark, #1a2f50);
    line-height: 1.1; margin-bottom: 10px;
  }
  .sc-heading em { font-style: italic; color: var(--accent, #3d72a8); }
  .sc-sub {
    font-size: 16px; color: #5c7898;
    font-weight: 300; line-height: 1.7; margin-bottom: 48px;
  }
  .sc-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 48px; align-items: start;
  }

  /* ── Info / Perks side ── */
  .sc-info-card {
    background: #1a2f50;
    border-radius: 10px; padding: 40px 36px;
    position: relative; overflow: hidden;
  }
  .sc-info-card::before {
    content: '';
    position: absolute; inset: 0; pointer-events: none;
    background-image: radial-gradient(circle at 90% 10%, rgba(196,168,130,0.15) 0%, transparent 60%);
  }
  .sc-info-title {
    font-family: Georgia, serif;
    font-size: 26px; font-weight: 700;
    color: #fff; line-height: 1.15; margin-bottom: 12px;
  }
  .sc-info-sub {
    font-size: 14px; color: rgba(255,255,255,0.6);
    font-weight: 300; line-height: 1.7; margin-bottom: 28px;
  }
  .sc-perks { list-style: none; }
  .sc-perks li {
    font-size: 14px; color: rgba(255,255,255,0.85);
    margin-bottom: 14px; display: flex; align-items: center; gap: 10px;
  }
  .sc-perks li::before {
    content: '✓'; font-size: 12px; font-weight: 700;
    color: #6b9bc4; flex-shrink: 0;
  }
  .sc-contact-line {
    margin-top: 32px; padding-top: 24px;
    border-top: 1px solid rgba(196,168,130,0.2);
    font-size: 13px; color: rgba(255,255,255,0.5);
  }
  .sc-contact-line a { color: #6b9bc4; text-decoration: none; }
  .sc-contact-line strong { color: rgba(255,255,255,0.8); }

  /* ── Calendar ── */
  .sc-cal-widget {
    background: #ffffff;
    border: 1px solid #ccd8ea;
    border-radius: 10px;
    padding: 28px 24px 20px;
    box-shadow: 0 4px 32px rgba(26,47,80,0.10);
  }
  .sc-cal-header {
    font-family: Georgia, serif; font-size: 20px; font-weight: 700;
    color: #1a2f50; text-align: center; margin-bottom: 18px;
  }
  .sc-cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .sc-cal-btn {
    background: #f5f0e8; border: none; cursor: pointer;
    width: 34px; height: 34px; border-radius: 50%;
    font-size: 24px; line-height: 1; color: #1a2f50;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .sc-cal-btn:hover:not(:disabled) { background: #d8e4f0; }
  .sc-cal-btn:disabled { opacity: 0.25; cursor: default; }
  .sc-cal-month { font-size: 15px; font-weight: 500; color: #1a2f50; }
  .sc-cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    text-align: center; margin-bottom: 4px;
  }
  .sc-cal-weekdays span {
    font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
    color: #5c7898; padding: 4px 0; text-transform: uppercase;
  }
  .sc-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .sc-cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 13px; border-radius: 50%; cursor: pointer;
    color: #1a2f50; font-weight: 600; position: relative;
    transition: background 0.15s, color 0.15s;
  }
  .sc-cal-day:hover:not(.sc-cal-day--past):not(.sc-cal-day--empty) {
    background: #d8e4f0; color: #2a5589;
  }
  .sc-cal-day--past { color: #ccc; cursor: default; font-weight: 400; }
  .sc-cal-day--empty { cursor: default; }
  .sc-cal-day--today::after {
    content: ''; position: absolute; bottom: 3px; left: 50%;
    transform: translateX(-50%); width: 4px; height: 4px;
    border-radius: 50%; background: var(--accent, #3d72a8);
  }
  .sc-cal-tz { text-align: center; margin-top: 12px; font-size: 11px; color: #5c7898; }

  /* ── Modal ── */
  .sc-modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65); z-index: 500;
    align-items: center; justify-content: center; padding: 20px;
  }
  .sc-modal-overlay.open { display: flex; }
  .sc-modal {
    background: #fff; border-radius: 10px;
    position: relative; width: 100%; max-width: 440px;
    overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.25);
  }
  #sc-modal-content iframe { display: block; width: 100%; height: 700px; border: none; }
  .sc-modal-close {
    position: absolute; top: 10px; right: 10px; z-index: 10;
    background: rgba(0,0,0,0.08); border: none; cursor: pointer;
    width: 30px; height: 30px; border-radius: 50%;
    font-size: 13px; color: #1a2f50;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .sc-modal-close:hover { background: rgba(0,0,0,0.15); }

  @media (max-width: 720px) {
    .sc-grid { grid-template-columns: 1fr; gap: 28px; }
  }
  @media (max-width: 600px) {
    .sc-section { padding: 56px 20px; }
    .sc-info-card { padding: 28px 20px; }
    .sc-cal-widget { padding: 20px 16px 14px; }
  }
</style>
<!-- ══ END <head> STYLES ═════════════════════════════════════════ -->

<!-- ══ 3. PASTE THIS JUST BEFORE </body> ════════════════════════ -->
<script>
  // EDIT: replace with this client's Calendly URL
  const SC_CALENDLY = '[CLIENT_CALENDLY_URL]';

  (function () {
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];
    const userTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
    document.getElementById('sc-cal-tz').textContent =
      'Times shown in ' + userTZ.replace(/_/g, ' ');

    const today = new Date(); today.setHours(0,0,0,0);
    let viewYear  = today.getFullYear();
    let viewMonth = today.getMonth();

    function render() {
      document.getElementById('sc-cal-month').textContent =
        MONTHS[viewMonth] + ' ' + viewYear;

      const prevBtn = document.getElementById('sc-cal-prev');
      prevBtn.disabled = (viewYear === today.getFullYear() && viewMonth === today.getMonth());

      const grid = document.getElementById('sc-cal-grid');
      grid.innerHTML = '';

      const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

      for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div');
        el.className = 'sc-cal-day sc-cal-day--empty';
        grid.appendChild(el);
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(viewYear, viewMonth, d);
        const el   = document.createElement('div');
        el.className = 'sc-cal-day';
        el.textContent = d;

        if (date < today) {
          el.classList.add('sc-cal-day--past');
        } else {
          if (date.getTime() === today.getTime()) el.classList.add('sc-cal-day--today');
          const y = viewYear, m = viewMonth, day = d;
          el.addEventListener('click', function () { scOpenModal(y, m, day); });
        }
        grid.appendChild(el);
      }
    }

    document.getElementById('sc-cal-prev').addEventListener('click', function () {
      if (viewMonth === 0) { viewMonth = 11; viewYear--; } else viewMonth--;
      render();
    });
    document.getElementById('sc-cal-next').addEventListener('click', function () {
      if (viewMonth === 11) { viewMonth = 0; viewYear++; } else viewMonth++;
      render();
    });

    render();

    function scOpenModal(y, m, d) {
      const dateStr = y + '-' + String(m + 1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      const url = SC_CALENDLY + '?date=' + dateStr
        + '&hide_gdpr_banner=1'
        + '&timezone=' + encodeURIComponent(userTZ);
      document.getElementById('sc-modal-content').innerHTML =
        '<iframe src="' + url + '" allowfullscreen></iframe>';
      document.getElementById('sc-modal-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function scCloseModal() {
      document.getElementById('sc-modal-overlay').classList.remove('open');
      document.getElementById('sc-modal-content').innerHTML = '';
      document.body.style.overflow = '';
    }

    document.getElementById('sc-modal-close').addEventListener('click', scCloseModal);
    document.getElementById('sc-modal-overlay').addEventListener('click', function (e) {
      if (e.target === this) scCloseModal();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') scCloseModal();
    });
  })();
</script>
